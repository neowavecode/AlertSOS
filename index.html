<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlertSOS - Emergency App</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <!-- Animated Background -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <nav>
    <a href="index.html" class="logo">AlertSOS</a>
    <div class="lang-selector">
      <select id="lang-selector">
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="pt">🇵🇹 Português</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="ar">🇸🇦 العربية</option>
      </select>
    </div>
  </nav>

  <main class="container">
    <div class="glass-card">
      <h1 data-i18n="heroTitle">Emergency Help, One Tap Away</h1>
      <p data-i18n="heroDesc">AlertSOS is the simplest, most accessible emergency app. Trigger a loud siren, make an emergency call, and send your GPS location via WhatsApp instantly.</p>
      
      <div class="store-buttons">
        <a href="#" class="btn btn-apple">
          <i class="fab fa-apple"></i> <span data-i18n="btnApple">App Store</span>
        </a>
        <a href="#" class="btn btn-google">
          <i class="fab fa-google-play"></i> <span data-i18n="btnGoogle">Google Play</span>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="privacy.html" data-i18n="footerPrivacy">Privacy Policy</a>
      <a href="terms.html" data-i18n="footerTerms">Terms & Conditions</a>
      <a href="support.html" data-i18n="footerSupport">Support</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
